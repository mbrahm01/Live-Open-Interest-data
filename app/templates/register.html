<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register — NSE Option Chain</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #c9d1d9;
  }
  .card {
    width: 320px; background: #161b22; border: 1px solid #30363d; border-radius: 10px;
    padding: 32px;
  }
  h1 { font-size: 20px; margin: 0 0 24px; text-align: center; }
  label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
  input {
    width: 100%; box-sizing: border-box; padding: 10px 12px; margin-bottom: 16px;
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px;
  }
  input:focus { outline: none; border-color: #58a6ff; }
  button {
    width: 100%; padding: 10px; background: #238636; border: none; border-radius: 6px;
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: #2ea043; }
  .err { color: #f85149; font-size: 13px; margin-bottom: 12px; min-height: 16px; }
  .hint { font-size: 12px; color: #8b949e; margin: -10px 0 16px; }
  .foot { text-align: center; margin-top: 16px; font-size: 13px; color: #8b949e; }
  .foot a { color: #58a6ff; text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>Create account</h1>
    <div class="err" id="err"></div>
    <form id="registerForm">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6">
      <div class="hint">At least 6 characters</div>
      <button type="submit">Create account</button>
    </form>
    <div class="foot">Already have an account? <a href="/login">Sign in</a></div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('err');
      errEl.textContent = '';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Registration failed';
        }
      } catch {
        errEl.textContent = 'Network error — try again';
      }
    });
  </script>
</body>
</html>
